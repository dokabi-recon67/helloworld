#cloud-config
# HelloWorld Server Auto-Setup Script
# Paste this in Oracle Cloud "Cloud-init script" box

package_update: true
package_upgrade: true

packages:
  - stunnel
  - openssh-server
  - curl
  - wget
  - tor
  - firewalld

write_files:
  - path: /etc/helloworld/stunnel.conf
    permissions: '0644'
    content: |
      pid = /var/run/stunnel.pid
      setuid = nobody
      setgid = nobody
      
      [ssh]
      accept = 443
      connect = 127.0.0.1:22
      cert = /etc/helloworld/server.pem
      key = /etc/helloworld/server.key

  - path: /etc/systemd/system/helloworld.service
    permissions: '0644'
    content: |
      [Unit]
      Description=HelloWorld Tunnel Server
      After=network.target
      
      [Service]
      Type=forking
      ExecStart=/usr/bin/stunnel /etc/helloworld/stunnel.conf
      ExecReload=/bin/kill -HUP $MAINPID
      Restart=on-failure
      
      [Install]
      WantedBy=multi-user.target

runcmd:
  # Create config directory
  - mkdir -p /etc/helloworld
  
  # Generate self-signed TLS certificate
  - openssl req -x509 -nodes -days 3650 -newkey rsa:4096 -keyout /etc/helloworld/server.key -out /etc/helloworld/server.pem -subj "/CN=localhost"
  - chmod 600 /etc/helloworld/server.key
  - chmod 644 /etc/helloworld/server.pem
  
  # Configure SSH for key-only authentication
  - sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart sshd
  
  # Configure firewall - open port 443
  - systemctl start firewalld
  - systemctl enable firewalld
  - firewall-cmd --permanent --add-port=443/tcp
  - firewall-cmd --permanent --add-port=443/udp
  - firewall-cmd --reload
  
  # Enable and start HelloWorld service
  - systemctl daemon-reload
  - systemctl enable helloworld
  - systemctl start helloworld
  
  # Configure Tor (optional, for Tor mode)
  - systemctl enable tor
  - |
    cat >> /etc/tor/torrc << 'EOF'
    ControlPort 9051
    CookieAuthentication 0
    EOF
  - systemctl restart tor
  
  # Create status script
  - |
    cat > /usr/local/bin/helloworld-status << 'EOF'
    #!/bin/bash
    echo "=== HelloWorld Server Status ==="
    echo ""
    echo "Stunnel (TLS):"
    systemctl is-active stunnel4 2>/dev/null || systemctl is-active helloworld
    echo ""
    echo "SSH:"
    systemctl is-active sshd
    echo ""
    echo "Tor:"
    systemctl is-active tor
    echo ""
    echo "Public IP:"
    curl -s https://api.ipify.org
    echo ""
    echo ""
    echo "Port 443:"
    ss -tlnp | grep :443 || netstat -tlnp | grep :443
    EOF
  - chmod +x /usr/local/bin/helloworld-status
  
  # Log completion
  - echo "HelloWorld setup complete at $(date)" >> /var/log/helloworld-setup.log

final_message: "HelloWorld server setup complete! Connect on port 443."

